<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog — AR Modest Fashion</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site">
  <div class="nav">
    <div class="logo">AR<span class="mark">.</span><small style="margin-left:6px;">Modest Fashion</small></div>
    <button class="burger btn-ghost btn btn-sm">Menu</button>
    <nav class="nav-links">
      <a href="index.html">Beranda</a>
      <a href="catalog.html" class="active">Katalog</a>
      <a href="catalog.html?cat=Pashmina">Pashmina</a>
      <a href="catalog.html?cat=Couple">Couple</a>
      <a href="catalog.html?cat=Kids">Kids</a>
    </nav>
    <div class="nav-actions">
      <a href="cart.html" class="icon-btn" aria-label="Keranjang">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6h15l-1.5 9h-12z"/><path d="M6 6L4 2H2"/><circle cx="9" cy="20" r="1.5"/><circle cx="17" cy="20" r="1.5"/></svg>
        <span class="badge" data-cart-count style="display:none;">0</span>
      </a>
      <a href="admin.html" class="icon-btn" aria-label="Admin">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.5-7 8-7s8 3 8 7"/></svg>
      </a>
    </div>
  </div>
</header>

<section style="padding-bottom:0;">
  <div class="wrap">
    <span class="eyebrow">Katalog</span>
    <h2 style="margin-top:8px;">Semua Koleksi AR</h2>
    <p style="color:var(--ink-soft);max-width:520px;margin-top:10px;">Temukan hijab yang pas untuk setiap momen — dari harian, kerja, hingga acara spesial.</p>
  </div>
</section>

<section style="padding-top:30px;">
  <div class="wrap">
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="Cari produk, misal: pashmina, bergo...">
    </div>
    <div class="filters" id="filterChips"></div>
    <div class="grid" id="catalogGrid"></div>
  </div>
</section>

<footer class="site">
  <div class="wrap foot-bottom" style="border-top:none;">
    <span>© 2026 AR Modest Fashion.</span>
    <a href="index.html" style="color:#fff;">Kembali ke Beranda</a>
  </div>
</footer>

<script src="js/app.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  let activeCat = params.get('cat') || 'Semua';
  const cats = ['Semua', 'Pashmina', 'Bergo', 'Segiempat', 'Couple', 'Kids', 'Sarimbit'];

  function renderChips(){
    document.getElementById('filterChips').innerHTML = cats.map(c =>
      `<button class="chip ${c===activeCat?'active':''}" onclick="setCat('${c}')">${c}</button>`
    ).join('');
  }
  function setCat(c){ activeCat = c; renderChips(); filterAndRender(); }

  function filterAndRender(){
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    let list = AR.getProducts();
    if(activeCat !== 'Semua') list = list.filter(p => p.cat === activeCat);
    if(q) list = list.filter(p => p.name.toLowerCase().includes(q));
    AR.renderGrid('#catalogGrid', list);
  }

  document.getElementById('searchInput').addEventListener('input', filterAndRender);
  renderChips();
  filterAndRender();
</script>
</body>
</html>
